<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 备课助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8f6f2;
            --sidebar-bg: #1e1e2e;
            --sidebar-text: #cdd6f4;
            --sidebar-hover: #313244;
            --sidebar-active: #45475a;
            --card-bg: #ffffff;
            --text: #1e1e2e;
            --text-secondary: #6c7086;
            --border: #e0e3e8;
            --accent: #7c3aed;
            --accent-light: #ede9fe;
            --accent-hover: #6d28d9;
            --teal: #0d9488;
            --teal-light: #ccfbf1;
            --amber: #b45309;
            --amber-light: #fef3c7;
            --rose: #be185d;
            --rose-light: #fce7f3;
            --sky: #0369a1;
            --sky-light: #e0f2fe;
            --emerald: #047857;
            --emerald-light: #d1fae5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }
        /* SVG 图标通用样式 */
        .ico { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; flex-shrink: 0; }
        .ico-sm { width: 16px; height: 16px; }
        .ico-md { width: 20px; height: 20px; }
        .ico-lg { width: 24px; height: 24px; }
        .ico-xl { width: 48px; height: 48px; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ====== 侧边栏 ====== */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            min-height: 100vh;
        }
        .sidebar-header {
            padding: 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
        }
        .sidebar-header:hover { background: rgba(255,255,255,0.02); }
        .sidebar-header h2 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }
        .sidebar-header p {
            font-size: 11px;
            color: #a6adc8;
            margin-top: 4px;
        }
        .sidebar-modules {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }
        .module-item {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 13px;
        }
        .module-item:hover { background: rgba(255,255,255,0.04); }
        .module-item.active {
            background: rgba(124, 58, 237, 0.2);
            color: #c4b5fd;
        }
        .module-item .emoji { font-size: 18px; }
        .back-btn {
            margin: 12px;
            padding: 12px 14px;
            border: 1px solid rgba(124,58,237,0.4);
            border-radius: 10px;
            background: rgba(124,58,237,0.1);
            color: #c4b5fd;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .back-btn:hover {
            background: rgba(124,58,237,0.2);
            border-color: var(--accent);
            color: #fff;
            transform: translateY(-1px);
        }
        .sidebar-footer {
            padding: 12px 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px;
            color: #585b70;
        }

        /* ====== 主区域 ====== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .top-bar h1 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }
        .top-bar h1 .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.15s;
        }
        .stat-card:hover {
            transform: translateY(-1px);
            border-color: var(--accent);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .stat-icon.purple { background: var(--accent-light); color: var(--accent); }
        .stat-icon.blue { background: var(--sky-light); color: var(--sky); }
        .stat-icon.green { background: var(--emerald-light); color: var(--emerald); }
        .stat-info .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .stat-info .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        /* 资料卡片 */
        .profile-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .avatar-section {
            position: relative;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid var(--accent-light);
            box-shadow: 0 4px 12px rgba(124,58,237,0.12);
            cursor: pointer;
            transition: all 0.2s;
        }
        .avatar:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(124,58,237,0.2);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-upload-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            background: var(--accent);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(124,58,237,0.4);
            transition: all 0.2s;
        }
        .avatar-upload-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.1);
        }
        .avatar-upload-btn input { display: none; }
        .user-info h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .user-info h2:hover {
            color: var(--accent);
        }
        .user-info p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .username-edit-input {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            padding: 4px 8px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            outline: none;
            min-width: 120px;
        }

        .form-section {
            margin-bottom: 28px;
        }
        .form-section:last-child { margin-bottom: 0; }
        .form-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-section h3 .ico {
            color: var(--accent);
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .btn-submit {
            padding: 10px 28px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124,58,237,0.3);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-save-profile {
            padding: 10px 28px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: none;
            margin-top: 16px;
        }
        .btn-save-profile.show {
            display: inline-block;
        }
        .btn-save-profile:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124,58,237,0.3);
        }
        .btn-logout {
            padding: 10px 28px;
            background: #fee2e2;
            color: var(--danger);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-logout:hover {
            background: #fecaca;
            transform: translateY(-1px);
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <svg style="display:none">
        <symbol id="i-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8M8 11h6"/></symbol>
        <symbol id="i-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
        <symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
        <symbol id="i-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></symbol>
        <symbol id="i-message" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></symbol>
        <symbol id="i-paperclip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></symbol>
        <symbol id="i-key" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></symbol>
        <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
        <symbol id="i-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></symbol>
        <symbol id="i-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
        <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></symbol>
        <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></symbol>
    </svg>
    <!-- ====== 侧边栏 ====== -->
    <aside class="sidebar">
        <div class="sidebar-header" onclick="location.href='/'">
            <h2><svg class="ico ico-md"><use href="#i-book"/></svg> 备课助手</h2>
            <p>AI 驱动的智能备课平台</p>
        </div>
        <div class="sidebar-modules">
            {% for m in all_modules %}
            <div class="module-item" onclick="window.location.href='/module/{{ m.id }}'">
                <span class="emoji">{{ m.emoji }}</span>
                <span>{{ m.name }}</span>
            </div>
            {% endfor %}
        </div>
        <div class="back-btn" onclick="location.href='/'">
            <svg class="ico ico-sm"><use href="#i-home"/></svg> 返回首页
        </div>
        <div class="sidebar-footer">
            当前位置：个人中心
        </div>
    </aside>

    <!-- ====== 主区域 ====== -->
    <div class="main-content">
        <div class="top-bar">
            <h1><span class="logo-icon"><svg class="ico ico-md"><use href="#i-user"/></svg></span> 个人中心</h1>
            <div class="user-badge">
                <span>{{ user.username }}</span>
            </div>
        </div>

        <div class="content-area">
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <!-- 使用统计 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon purple"><svg class="ico ico-lg"><use href="#i-folder"/></svg></div>
                    <div class="stat-info">
                        <div class="label">总会话</div>
                        <div class="value">{{ usage_stats.total_sessions }}</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue"><svg class="ico ico-lg"><use href="#i-message"/></svg></div>
                    <div class="stat-info">
                        <div class="label">消息总数</div>
                        <div class="value">{{ usage_stats.total_messages }}</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><svg class="ico ico-lg"><use href="#i-paperclip"/></svg></div>
                    <div class="stat-info">
                        <div class="label">生成文件</div>
                        <div class="value">{{ usage_stats.total_files }}</div>
                    </div>
                </div>
            </div>

            <!-- 个人资料 -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar-section">
                        <div class="avatar" id="avatar-display">
                            <span id="avatar-placeholder"><svg class="ico ico-xl"><use href="#i-user"/></svg></span>
                        </div>
                        <label class="avatar-upload-btn">
                            <input type="file" id="avatar-input" accept="image/*">
                            <svg class="ico ico-sm"><use href="#i-camera"/></svg>
                        </label>
                    </div>
                    <div class="user-info">
                        <h2 id="current-username" onclick="startEditUsername()">点击修改名称</h2>
                        <p id="current-email">加载中...</p>
                    </div>
                </div>

                <button class="btn-save-profile" id="btn-save-profile">保存资料</button>

                <div class="form-section">
                    <h3><svg class="ico ico-sm"><use href="#i-key"/></svg> 修改密码</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password-input">新密码</label>
                            <input type="password" id="password-input" placeholder="请输入新密码" minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password-input">确认密码</label>
                            <input type="password" id="confirm-password-input" placeholder="请再次输入密码">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email-input">邮箱验证（输入当前登录邮箱）</label>
                        <input type="email" id="email-input" placeholder="请输入您的邮箱">
                    </div>
                    <button class="btn-submit" id="btn-update-password">修改密码</button>
                </div>

                <div class="form-section">
                    <h3><svg class="ico ico-sm"><use href="#i-shield"/></svg> 账号安全</h3>
                    <button class="btn-logout" id="btn-logout"><svg class="ico ico-sm"><use href="#i-logout"/></svg> 退出登录</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const avatarDisplay = document.getElementById('avatar-display');
        const avatarPlaceholder = document.getElementById('avatar-placeholder');
        const avatarInput = document.getElementById('avatar-input');
        const currentUsername = document.getElementById('current-username');
        const currentEmail = document.getElementById('current-email');
        const btnSaveProfile = document.getElementById('btn-save-profile');
        const passwordInput = document.getElementById('password-input');
        const confirmPasswordInput = document.getElementById('confirm-password-input');
        const emailInput = document.getElementById('email-input');
        const btnUpdatePassword = document.getElementById('btn-update-password');
        const btnLogout = document.getElementById('btn-logout');

        let originalUsername = '';
        let editedUsername = '';
        let pendingAvatarFile = null;
        let pendingAvatarUrl = null;

        async function loadProfile() {
            try {
                const response = await fetch('/api/profile');
                const data = await response.json();
                if (data.success && data.user) {
                    const user = data.user;
                    originalUsername = user.username || '未设置';
                    editedUsername = originalUsername;
                    currentUsername.textContent = originalUsername;
                    currentEmail.textContent = user.email;
                    emailInput.value = user.email;

                    if (user.avatar_url) {
                        avatarPlaceholder.style.display = 'none';
                        avatarDisplay.innerHTML = `<img src="${user.avatar_url}" alt="头像">`;
                    }
                }
            } catch (error) {
                console.error('加载资料失败:', error);
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
        }

        function startEditUsername() {
            if (currentUsername.querySelector('input')) return;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'username-edit-input';
            input.value = currentUsername.textContent;
            input.focus();
            input.select();

            currentUsername.innerHTML = '';
            currentUsername.appendChild(input);

            input.addEventListener('blur', () => {
                finishEditUsername(input.value);
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    input.blur();
                } else if (e.key === 'Escape') {
                    finishEditUsername(originalUsername);
                }
            });
        }

        function finishEditUsername(newUsername) {
            newUsername = newUsername.trim();
            if (!newUsername) {
                newUsername = originalUsername;
            }
            
            editedUsername = newUsername;
            currentUsername.innerHTML = '';
            currentUsername.textContent = newUsername;
            
            if (newUsername !== originalUsername) {
                showSaveButton();
            } else if (!pendingAvatarFile && !pendingAvatarUrl) {
                hideSaveButton();
            }
        }

        function showSaveButton() {
            btnSaveProfile.classList.add('show');
        }

        function hideSaveButton() {
            btnSaveProfile.classList.remove('show');
        }

        async function handleAvatarChange() {
            const file = avatarInput.files[0];
            if (!file) return;

            pendingAvatarFile = file;
            showSaveButton();

            const reader = new FileReader();
            reader.onload = function(e) {
                avatarPlaceholder.style.display = 'none';
                avatarDisplay.innerHTML = `<img src="${e.target.result}" alt="头像">`;
            };
            reader.readAsDataURL(file);
        }

        async function saveProfile() {
            const hasChanges = editedUsername !== originalUsername || pendingAvatarFile;
            
            if (!hasChanges) {
                hideSaveButton();
                return;
            }

            btnSaveProfile.disabled = true;
            btnSaveProfile.innerHTML = '<span class="loading-spinner"></span>保存中...';

            try {
                let avatarUrl = null;

                if (pendingAvatarFile) {
                    const formData = new FormData();
                    formData.append('avatar', pendingAvatarFile);

                    const avatarResponse = await fetch('/api/profile/avatar', {
                        method: 'POST',
                        credentials: 'same-origin',
                        body: formData
                    });

                    const avatarData = await avatarResponse.json();
                    if (avatarData.success) {
                        avatarUrl = avatarData.avatar_url;
                    } else {
                        throw new Error(avatarData.error || '头像上传失败');
                    }
                }

                if (editedUsername !== originalUsername) {
                    const usernameResponse = await fetch('/api/profile/username', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'same-origin',
                        body: JSON.stringify({ username: editedUsername })
                    });

                    const usernameData = await usernameResponse.json();
                    if (!usernameData.success) {
                        throw new Error(usernameData.error || '用户名修改失败');
                    }
                }

                showSuccess('资料保存成功');
                originalUsername = editedUsername;
                pendingAvatarFile = null;
                hideSaveButton();

            } catch (error) {
                showError(error.message || '保存失败');
            } finally {
                btnSaveProfile.disabled = false;
                btnSaveProfile.textContent = '保存资料';
            }
        }

        async function updatePassword() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const email = emailInput.value.trim();

            if (!password || !confirmPassword) {
                showError('请输入密码');
                return;
            }

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            if (password.length < 6) {
                showError('密码长度至少6位');
                return;
            }

            if (!email) {
                showError('请输入邮箱进行验证');
                return;
            }

            btnUpdatePassword.disabled = true;
            btnUpdatePassword.innerHTML = '<span class="loading-spinner"></span>修改中...';

            try {
                const response = await fetch('/api/profile/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        password: password,
                        confirm_password: confirmPassword,
                        email: email
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showSuccess(data.message || '密码修改成功，请重新登录');
                    passwordInput.value = '';
                    confirmPasswordInput.value = '';
                } else {
                    showError(data.error || '修改失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            } finally {
                btnUpdatePassword.disabled = false;
                btnUpdatePassword.textContent = '修改密码';
            }
        }

        btnSaveProfile.addEventListener('click', saveProfile);
        avatarInput.addEventListener('change', handleAvatarChange);
        btnUpdatePassword.addEventListener('click', updatePassword);
        btnLogout.addEventListener('click', () => {
            localStorage.removeItem('bk_login_mode');
            localStorage.removeItem('bk_login_account');
            localStorage.removeItem('bk_login_password');
            window.location.href = '/logout';
        });

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
