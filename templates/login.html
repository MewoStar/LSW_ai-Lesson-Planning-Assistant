<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备课助手 - 登录</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Microsoft YaHei", sans-serif;
            background-color: #FAF7F2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/static/city.png');
            background-size: 110% auto;
            background-repeat: no-repeat;
            background-position: center 85%;
            opacity: 0.95;
            z-index: 0;
        }
        .paper-plane-1 {
            position: absolute;
            top: 8%;
            left: 5%;
            width: 120px;
            height: 80px;
            opacity: 0.19;
            z-index: 0;
            transform: rotate(-15deg);
        }
        .paper-plane-2 {
            position: absolute;
            top: 18%;
            right: 8%;
            width: 80px;
            height: 55px;
            opacity: 0.19;
            z-index: 0;
            transform: rotate(15deg);
        }
        .bottom-layer-1 {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 200px;
            background: rgba(124, 58, 237, 0.12);
            border-radius: 50% 50% 0 0 / 60% 60% 0 0;
            z-index: 0;
        }
        .bottom-layer-2 {
            position: absolute;
            bottom: 0;
            left: -5%;
            width: 110%;
            height: 160px;
            background: rgba(167, 139, 250, 0.08);
            border-radius: 50% 50% 0 0 / 50% 50% 0 0;
            z-index: 0;
        }
        .bottom-layer-3 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: rgba(192, 165, 252, 0.05);
            border-radius: 50% 50% 0 0 / 40% 40% 0 0;
            z-index: 0;
        }
        .bottom-grid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 400px;
            background-image:
                linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to top, black 20%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, black 20%, transparent 100%);
            z-index: 0;
        }
        .login-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            display: block;
            color: #7c3aed;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1e1e2e;
        }
        .subtitle {
            font-size: 14px;
            color: #6c7086;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e3e8;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: #7c3aed;
            background: white;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .form-group input::placeholder {
            color: #9ca3af;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124,58,237,0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .link-section {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e3e8;
        }
        .link-section a {
            color: #7c3aed;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .link-section a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .loading {
            display: inline-flex;
            gap: 3px;
        }
        .loading span {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: dot 1.4s infinite;
        }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%,80%,100%{opacity:0.2;transform:scale(0.7)} 40%{opacity:1;transform:scale(1)} }

        .login-tabs {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
            position: relative;
        }
        .login-tab {
            font-size: 15px;
            font-weight: 600;
            color: #9ca3af;
            cursor: pointer;
            padding-bottom: 6px;
            position: relative;
            transition: color 0.2s;
            border: none;
            background: none;
        }
        .login-tab:hover {
            color: #7c3aed;
        }
        .login-tab.active {
            color: #7c3aed;
        }
        .login-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            border-radius: 2px;
        }
        .remember-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            margin-top: -4px;
        }
        .remember-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #6c7086;
            user-select: none;
        }
        .remember-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #7c3aed;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <svg class="paper-plane-1" viewBox="0 0 120 80" fill="none">
        <path d="M5 40 L115 40 L85 10 L5 40" stroke="#808090" stroke-width="1" stroke-linejoin="round"/>
        <path d="M85 10 L85 70 L5 40" stroke="#808090" stroke-width="1" stroke-linejoin="round"/>
    </svg>
    <svg class="paper-plane-2" viewBox="0 0 80 55" fill="none">
        <path d="M75 27 L5 27 L30 5 L75 27" stroke="#808090" stroke-width="1" stroke-linejoin="round"/>
        <path d="M30 5 L30 49 L75 27" stroke="#808090" stroke-width="1" stroke-linejoin="round"/>
    </svg>
    <div class="bottom-layer-1"></div>
    <div class="bottom-layer-2"></div>
    <div class="bottom-layer-3"></div>
    <div class="bottom-grid"></div>
    <div class="login-container">
        <div class="logo-section">
            <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <div class="title">备课助手</div>
            <div class="subtitle">AI 驱动的智能备课平台</div>
        </div>

        <div class="login-tabs">
            <button type="button" class="login-tab active" id="tab-email" onclick="switchTab('email')">邮箱登录</button>
            <button type="button" class="login-tab" id="tab-username" onclick="switchTab('username')">账号登录</button>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email" id="email-label">邮箱</label>
                <input type="text" id="email" placeholder="请输入邮箱地址" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>

            <div class="remember-section">
                <label class="remember-item">
                    <input type="checkbox" id="remember-account">
                    <span>记住账号</span>
                </label>
                <label class="remember-item">
                    <input type="checkbox" id="remember-password">
                    <span>记住密码</span>
                </label>
            </div>
            
            <button type="submit" class="btn-primary" id="submit-btn">
                <span id="btn-text">登 录</span>
                <span id="btn-loading" class="loading" style="display:none"><span></span><span></span><span></span></span>
            </button>
        </form>
        
        <div class="link-section">
            <span>还没有账号？</span>
            <a href="/register">立即注册</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://evcvgguzvnvtxozdvuwz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2Y3ZnZ3V6dm52dHhvemR2dXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4ODY0NTUsImV4cCI6MjA5OTQ2MjQ1NX0.6N-L8UHoJdKdDID8TYlI8J84g6u2weBwmyWUJaYnUJ8';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('login-form');
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const rememberAccount = document.getElementById('remember-account');
        const rememberPassword = document.getElementById('remember-password');

        let loginMode = 'email'; // 'email' or 'username'

        // 页面加载时恢复保存的账号
        (function loadSavedLogin() {
            const savedMode = localStorage.getItem('bk_login_mode');
            const savedAccount = localStorage.getItem('bk_login_account');
            const savedPassword = localStorage.getItem('bk_login_password');

            if (savedMode === 'username' || savedMode === 'email') {
                switchTab(savedMode);
            }

            if (savedAccount) {
                email.value = savedAccount;
                rememberAccount.checked = true;
            }

            if (savedPassword) {
                password.value = savedPassword;
                rememberPassword.checked = true;
            }
        })();

        function switchTab(mode) {
            loginMode = mode;
            document.getElementById('tab-email').classList.toggle('active', mode === 'email');
            document.getElementById('tab-username').classList.toggle('active', mode === 'username');

            const label = document.getElementById('email-label');
            if (mode === 'email') {
                label.textContent = '邮箱';
                email.placeholder = '请输入邮箱地址';
            } else {
                label.textContent = '账号';
                email.placeholder = '请输入账号名称';
            }
            hideError();
            hideSuccess();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const loginId = email.value.trim();
            const pass = password.value.trim();

            if (!loginId || !pass) {
                showError(loginMode === 'email' ? '请输入邮箱和密码' : '请输入账号和密码');
                return;
            }

            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-flex';
            hideError();
            hideSuccess();

            try {
                if (loginMode === 'email') {
                    await loginWithEmail(loginId, pass);
                } else {
                    await loginWithUsernameOrAdmin(loginId, pass);
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });

        async function loginWithEmail(mail, pass) {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: mail,
                password: pass
            });
            
            if (error) {
                await tryBackendLogin(mail, pass);
            } else if (data.session) {
                await setSession(data.session);
            }
        }

        async function loginWithUsernameOrAdmin(username, pass) {
            try {
                const response = await fetch('/api/auth/get-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                
                const result = await response.json();
                
                if (response.ok && result.email) {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: result.email,
                        password: pass
                    });
                    
                    if (error) {
                        await tryBackendLogin(username, pass);
                    } else if (data.session) {
                        await setSession(data.session);
                    }
                } else {
                    await tryBackendLogin(username, pass);
                }
            } catch (err) {
                await tryBackendLogin(username, pass);
            }
        }

        async function tryBackendLogin(username, pass) {
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: pass })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    saveLoginInfo(username, pass);
                    showSuccess('登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = result.is_admin ? '/admin/dashboard' : '/';
                    }, 1500);
                } else {
                    showError(result.error || '用户名或密码错误');
                }
            } catch (err) {
                showError('用户名或密码错误');
            }
        }

        async function setSession(session) {
            try {
                const response = await fetch('/api/auth/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ access_token: session.access_token })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    saveLoginInfo(email.value.trim(), password.value.trim());
                    showSuccess('登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showError(result.error || '会话设置失败');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
            }
        }

        function saveLoginInfo(account, pass) {
            if (rememberAccount.checked) {
                localStorage.setItem('bk_login_mode', loginMode);
                localStorage.setItem('bk_login_account', account);
            } else {
                localStorage.removeItem('bk_login_mode');
                localStorage.removeItem('bk_login_account');
            }

            if (rememberPassword.checked) {
                localStorage.setItem('bk_login_password', pass);
            } else {
                localStorage.removeItem('bk_login_password');
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
        
        function hideError() {
            errorMsg.style.display = 'none';
        }
        
        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
        }
        
        function hideSuccess() {
            successMsg.style.display = 'none';
        }
    </script>
</body>
</html>
